<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scammer Details</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head><body><nav class="navbar navbar-dark bg-primary">
<div class="container">
<a class="navbar-brand" href="index.html">Fraud Checker BD</a>
</div>
</nav><div class="container mt-4"><div id="details"></div></div><script>

const params = new URLSearchParams(window.location.search)
const phone = params.get("phone")

fetch("data.json")
.then(res=>res.json())
.then(data=>{

const scam = data.find(x=>x.phone===phone)

if(!scam){
document.getElementById("details").innerHTML="<h4>No data found</h4>"
return
}

document.getElementById("details").innerHTML = `

<div class="card p-4">

<img src="${scam.photo}" class="img-fluid mb-3">

<h3>${scam.name}</h3>

<p><b>Phone:</b> ${scam.phone}</p>

<p><b>Reason:</b> ${scam.reason}</p>

<p><b>Reported by:</b> ${scam.reporter}</p>

<p><b>Time:</b> ${scam.time}</p>

</div>

`

})

</script></body>
</html>
